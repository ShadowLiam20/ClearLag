name: ClearLag
version: 1.0.0
main: com.shadow.ClearLagPlugin
api-version: "1.20"
author: Liam
description: Verwijdert automatisch items die op de grond liggen.
commands:
  clearlag:
    description: Herlaadt de ClearLag config.
    usage: /clearlag reload
    permission: clearlag.reload
permissions:
  clearlag.reload:
    description: Laat je de ClearLag config herladen.
    default: op
